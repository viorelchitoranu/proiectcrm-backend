# ═══════════════════════════════════════════════════════════════════════════
# Configurare logging ProiectCRM
# ═══════════════════════════════════════════════════════════════════════════
#
# Adaugă aceste linii în fișierul tău application.properties (sau
# application-dev.properties / application-prod.properties).
#
# Logback citește logback-spring.xml din src/main/resources/ automat.
# Aceste properties controlează calea fișierelor și profilul activ.
# ═══════════════════════════════════════════════════════════════════════════

# ── DEV (application-dev.properties) ────────────────────────────────────────
# Activează profilul Spring Boot "dev" — logback-spring.xml va folosi
# blocul <springProfile name="dev"> → console colorată, fără fișiere.
spring.profiles.active=dev

# Calea unde ar fi scrise fișierele dacă ai folosi profilul prod local.
# În dev această valoare nu e folosită (nu scriem fișiere în dev).
logging.file.path=./logs


# ── PROD (application-prod.properties sau variabile de mediu pe server) ──────
# Activează profilul "prod" — logback-spring.xml va folosi
# blocul <springProfile name="prod"> → fișiere cu rotație, fără console.
#
# spring.profiles.active=prod
#
# Calea completă unde Logback va scrie app.log și error.log.
# Directorul trebuie să existe și aplicația trebuie să aibă drepturi de scriere.
# Exemplu server Linux:
#   sudo mkdir -p /var/log/proiectcrm
#   sudo chown tomcat:tomcat /var/log/proiectcrm   (sau userul sub care rulezi)
#
# logging.file.path=/var/log/proiectcrm
#
# Alternativă dacă rulezi cu jar fără Tomcat standalone:
# logging.file.path=/opt/proiectcrm/logs


# ── Opțional: nivel de log per pachet (funcționează în ambele profiluri) ─────
# Util în dev pentru a vedea query-urile SQL Hibernate:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql=TRACE
#
# Util pentru a debugga Spring Security (login, sesiuni):
# logging.level.org.springframework.security=DEBUG
#
# Pachetul nostru — default INFO, poate fi coborât la DEBUG pentru debugging:
# logging.level.com.springapp.proiectcrm=DEBUG
