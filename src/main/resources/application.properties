# ============================================================
# APLICATIE
# ============================================================
spring.application.name=ProiectCRM
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=8080

# ============================================================
# BAZA DE DATE
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/proiectcrm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# ============================================================
# EMAIL
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8
app.mail.from-address=${MAIL_FROM:${EMAIL_USER}}

# ============================================================

# Dev:  http://localhost:5173
# Prod: https://domeniu-tau.ro
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

upload.dir=./uploads
upload.url-prefix=/api/files
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
# spring.jpa.defer-datasource-initialization=true

# NU mai pune spring.flyway.url / user / password
# Flyway preia automat din spring.datasource.*




spring.jpa.defer-datasource-initialization=true

# IMPORTANT: baseline-on-migrate=true + baseline-version=1 înseamnă că
# prima dată când rulezi aplicația pe DB-ul EXISTENT, Flyway va:
#   1. Crea tabela flyway_schema_history
#   2. Marca V1 ca deja aplicat (BASELINE) — fără să execute V1__baseline_schema.sql
#   3. Executa V2__billing_placeholder.sql și orice versiuni ulterioare
#
# Pe un DB NOU (client nou), Flyway va executa V1 + V2 + ... în ordine.

# ============================================================
# TENANT CONFIG — White-label
# Adaugă aceste linii în application.properties
# după secțiunea existentă de CORS.
#
# Valorile sunt suprascrise per client prin environment variables
# în docker-compose.yml / .env.local / .env.production
# ============================================================

# Numele organizației — apare în UI și emailuri
tenant.name=${TENANT_NAME:CRM Platform}

# URL-ul logo-ului — dacă e gol, se afișează text în sidebar
tenant.logo-url=${TENANT_LOGO_URL:}

# Culoarea primară — format hex CSS
tenant.primary-color=${TENANT_PRIMARY_COLOR:#1677ff}

# Culoarea secundară — opțională
tenant.secondary-color=${TENANT_SECONDARY_COLOR:}

# Numele din câmpul "From:" al emailurilor
tenant.email-from-name=${TENANT_EMAIL_FROM_NAME:${TENANT_NAME:CRM Platform}}

# Site-ul organizației
tenant.website=${TENANT_WEBSITE:}

# Telefonul de contact
tenant.phone=${TENANT_PHONE:}

# Emailul de suport (dacă diferă de emailul de trimitere)
tenant.support-email=${TENANT_SUPPORT_EMAIL:${app.mail.from-address:}}


# ============================================================
# FAZA 5 — Configurare Spring Actuator
# Adaugă în application.properties
# ============================================================

# ── Actuator — endpoint-uri expuse ───────────────────────────────────────────
# Expunem: health, info, metrics, env, loggers, scheduledtasks
# NU expunem: shutdown (periculos), heapdump (date sensibile în producție)
management.endpoints.web.exposure.include=health,info,metrics,env,loggers,scheduledtasks,beans
management.endpoints.web.base-path=/actuator

# ── Health endpoint — detalii complete (doar pentru autentificați) ────────────
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# ── Info endpoint ─────────────────────────────────────────────────────────────
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.build.enabled=true

# ── Info — date despre aplicație ──────────────────────────────────────────────
info.app.name=ProiectCRM
info.app.description=Platforma CRM pentru gestiunea cursurilor
info.app.version=1.0.0

# ── Metrics ───────────────────────────────────────────────────────────────────
# Activează metrici JVM, HTTP requests, datasource connections
management.metrics.enable.all=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ── Actuator Security (configurat și în SecurityConfig.java) ─────────────────
# /actuator/health → public (Docker health check, load balancer)
# /actuator/**     → doar ADMIN (configurat în SecurityConfig)





# ── OPS Dashboard — API Key pentru ActuatorApiKeyFilter ──────────────────────
# Generează cu: openssl rand -hex 32
# Același key se configurează în OPS Dashboard pentru acest client
ops.api-key=${OPS_API_KEY}


server.servlet.session.timeout=8h

spring.datasource.hikari.max-lifetime=580000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=30000