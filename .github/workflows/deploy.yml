name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts

      - name: Copiază sursele pe server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --ignore-errors \
            --exclude='.idea' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/proiectcrm/CRM_Backend/

      - name: Rebuild și repornește backend
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'EOF'
            cd /opt/proiectcrm
            docker rm $(docker ps -aq --filter name=crm_backend) 2>/dev/null || true
            docker-compose --env-file .env.production up --build -d backend
            sleep 10
            docker-compose ps backend
          EOF