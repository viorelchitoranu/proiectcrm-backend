name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy pe VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copiază sursele pe server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/proiectcrm/CRM_Backend/

      - name: Rebuild și repornește backend
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'EOF'
            cd /opt/proiectcrm
            OLD=$(docker ps -aq --filter name=crm_backend --filter status=exited)
            [ -n "$OLD" ] && docker rm $OLD || true
            docker-compose --env-file .env.production up --build -d backend
            sleep 10
            docker-compose ps backend
          EOF