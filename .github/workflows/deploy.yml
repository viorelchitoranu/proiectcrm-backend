name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy pe VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Copiază sursele pe server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/proiectcrm/CRM_Backend/

      - name: Rebuild și repornește backend
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /opt/proiectcrm && \
             OLD=\$(docker ps -aq --filter name=crm_backend --filter status=exited) && \
             [ -n \"\$OLD\" ] && docker rm \$OLD || true && \
             docker-compose --env-file .env.production up --build -d backend && \
             sleep 10 && \
             docker-compose ps backend"